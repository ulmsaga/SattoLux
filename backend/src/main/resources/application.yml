server:
  port: 8081

spring:
  application:
    name: sattolux
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 10
      connection-timeout: 30000

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    default-fetch-size: 100
    default-statement-timeout: 30

# AI (Anthropic Claude)
ai:
  claude:
    api-key: ${CLAUDE_API_KEY}
    model: claude-haiku-4-5-20251001
    base-url: https://api.anthropic.com

# Mailpit (개발용 메일)
spring.mail:
  host: ${MAIL_HOST:ulmsaga34.cafe24.com}
  port: ${MAIL_PORT:1025}
  properties:
    mail.smtp.auth: false
    mail.smtp.starttls.enable: false

# Satto 결과 API (동행복권)
satto:
  result-api: https://www.dhlottery.co.kr/lt645/selectPstLt645InfoNew.do
  result-referer: https://www.dhlottery.co.kr/lt645/result
  result:
    scheduler:
      cron: "0 */5 21-23 * * SAT"
  generation:
    scheduler:
      time: 09:00
      zone: Asia/Seoul

# 보안 (RSA / JWT)
security:
  jwt:
    secret: ${JWT_SECRET}
    access-token-validity-ms: 3600000      # 1h
    refresh-token-validity-ms: 1209600000  # 14d

logging:
  level:
    com.saga.sattolux: DEBUG
